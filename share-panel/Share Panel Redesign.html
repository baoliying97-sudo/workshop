document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lor-text-secondary);\n    font-size: var(--kd-font-size-sub-base);\n    display: inline-flex; align-items: center; gap: 4px;\n  }\n  .sp-row__chevron {\n    width: 16px; height: 16px; color: var(--kd-color-icon-secondary);\n  }\n\n  /* big switch */\n  .sp-switch-lg {\n    width: 36px; height: 20px;\n    border-radius: var(--kd-radius-full);\n    background: var(--kd-color-public-normal);\n    padding: 2px; display: inline-flex; justify-content: flex-end; align-items: center;\n    cursor: pointer;\n    transition: background var(--kd-time-fast) var(--kd-easing-ease);\n  }\n  .sp-switch-lg:hover,\n  .sp-row:hover .sp-switch-lg { background: var(--kd-color-public-hover); }\n  .sp-switch-lg:active,\n  .sp-row:active .sp-switch-lg { background: var(--kd-color-public-pressed); }\n  .sp-switch-lg.is-off:hover,\n  .sp-row:hover .sp-switch-lg.is-off { background: #BDBDBD; }\n  .sp-switch-lg.is-off:active,\n  .sp-row:active .sp-switch-lg.is-off { background: #A6A6A6; }\n  .sp-switch-lg__handle {\n    width: 16px; height: 16px;\n    border-radius: var(--kd-radius-full);\n    background: var(--kd-color-fill-base);\n    box-shadow: var(--kd-shadow-sm);\n  }\n\n  /* link row */\n  .sp-link-row {\n    position: relative;\n    display: flex; align-items: center; gap: 12px;\n    height: 44px;\n  }\n  .sp-link-row::before {\n    content: \"\";\n    position: absolute;\n    top: 0;\n    left: 32px;\n    right: 0;\n    height: 1px;\n    background: var(--kd-color-line-light);\n  }\n  .sp-link {\n    flex: 1;\n    font-size: var(--kd-font-size-sub-base);\n    color: var(--kd-color-text-primary);\n    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;\n  }\n  .sp-copy-btn {\n    height: 28px; padding: 0 12px;\n    border: 0;\n    border-radius: var(--kd-radius-md);\n    background: var(--kd-color-public-normal);\n    color: var(--kd-color-text-white);\n    font-size: var(--kd-font-size-sub-base);\n    display: inline-flex; align-items: center; gap: 4px;\n    cursor: pointer 14\u53d1\u4e2d\u5fc3/\u540e\u7aef\u7ec4', bg:'#E9C46A', char:'\u5468' },\n        { name:'\u5434\u4f73\u742a', sub:'\u91d1\u5c71\u529e\u516c/\u4ea7\u54c1\u4e2d\u5fc3/\u589e\u957f\u7ec4', bg:'#9B2335', char:'\u5434' },\n        { name:'\u8d75\u4e00\u9e23', sub:'\u91d1\u5c71\u529e\u516c/AI\u4e8b\u4e1a\u90e8/\u89c6\u89c9AI\u7ec4', bg:'#457B9D', char:'\u8d75' },\n        { name:'\u5b59\u96e8\u742a', sub:'\u91d1\u5c71\u529e\u516c/\u7814\u53d1\u4e2d\u5fc3/\u79fb\u52a8\u7ec4', bg:'#E63946', char:'\u5b59' },\n        { name:'\u94b1\u6653\u78ca', sub:'\u91d1\u5c71\u529e\u516c/\u5e02\u573a\u90e8/\u589e\u957f\u8fd0\u8425', bg:'#2A9D8F', char:'\u94b1' },\n      ];\n\n      var permMap = { readonly:'\u4ec5\u67e5\u770b', view:'\u53ef\u67e5\u770b', comment:'\u53ef\u8bc4\u8bba', edit:'\u53ef\u7f16\u8f91', manage:'\u53ef\u7ba1\u7406' };\n      var selected = {};\n\n      var inp       = document.getElementById('addCollabSearchInput');\n      var clearBtn  = document.getElementById('addCollabSearchClear');\n      var dropdown  = document.getElementById('addCollabDropdown');\n      var results   = document.getElementById('addCollabResults');\n      var countEl   = document.getElementById('addCollabSelectedCount');\n      var confirmBtn= document.getElementById('addCollabConfirm');\n      var chipsList = document.getElementById('addCollabChipsList');\n      var emptyHint = document.getElementById('addCollabEmptyHint');\n      if (!inp) return;\n\n      function highlight(text, q) {\n        if (!q) return text;\n        var idx = text.toLowerCase().indexOf(q.toLowerCase());\n        if (idx < 0) return text;\n        return text.slice(0, idx)\n          + '<span style=\"color:var(--kd-color-public-normal)\">' + text.slice(idx, idx + q.length) + '</span>'\n          + text.slice(idx + q.length);\n      }\n\n      function getJoinedItems() {\n        var list = document.getElementById('collabList');\n        if (!list) return [];\n        return Array.from(list.querySelectorAll('.sp-cpanel-item')).map(function(item) {\n          var nameEl   = item.querySelector('.sp-cpanel-item__name');\n          var subEl    = item.querySelector('.sp-cpanel-item__sub');\n          var avatarEl = item.querySelector('.sp-cpanel-item__avatar');\n          return {\n            name: nameEl ? (nameEl.firstChild && nameEl.firstChild.nodeType===3 ? nameEl.firstChild.textContent.trim() : nameEl.textContent.trim()) : '',\n            sub:  subEl  ? subEl.textContent.trim() : '',\n            bg:   avatarEl ? (avatarEl.style.background || '#999') : '#999',\n            char: avatarEl ? avatarEl.textContent.trim() : '?',\n            perm: item.dataset.perm || ''\n          };\n        });\n      }\n\n      function renderChips() {\n        var keys = Object.keys(selected);\n        emptyHint.style.display = keys.length ? 'none' : 'flex';\n        chipsList.innerHTML = keys.map(function(name, idx) {\n          var p = selected[name];\n          var isLast = idx === keys.length - 1;\n          return '<div class=\"sp-cpanel-item\" style=\"padding-left:12px;padding-right:12px;cursor:default\">'\n            + '<div class=\"sp-cpanel-item__row\" style=\"padding:10px 0\">'\n            + '<span class=\"sp-cpanel-item__avatar\" style=\"background:' + p.bg + '\">' + p.char + '</span>'\n            + '<div class=\"sp-cpanel-item__info\">'\n            + '<div class=\"sp-cpanel-item__name\">' + p.name + '</div>'\n            + '<div class=\"sp-cpanel-item__sub\">' + p.sub + '</div>'\n            + '</div>'\n            + '<button data-chip-remove=\"' + name + '\" style=\"display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border:none;background:none;cursor:pointer;color:var(--kd-color-text-tertiary);flex-shrink:0;border-radius:var(--kd-radius-base)\">'\n            + '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M3 3l8 8M11 3l-8 8\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"/></svg>'\n            + '</button>'\n            + '</div>'\n            + (isLast ? '' : '<div class=\"sp-cpanel-item__sep\" style=\"margin-left:36px\"></div>')\n            + '</div>';\n        }).join('');\n      }\n\n      function updateCount() {\n        var n = Object.keys(selected).length;\n        if (countEl) countEl.textContent = '(' + n + ')';\n        if (confirmBtn) confirmBtn.disabled = n === 0;\n        var selRow = document.getElementById('addCollabSelectedRow');\n        var notifyLabel = document.getElementById('addCollabNotifyLabel');\n        var footer = document.getElementById('addCollabFooter');\n        var searchInp = document.getElementById('addCollabSearchInput');\n        if (selRow) selRow.style.display = n > 0 ? 'flex' : 'none';\n        if (notifyLabel) notifyLabel.style.display = n > 0 ? '' : 'none';\n        if (footer) footer.style.display = n > 0 ? 'flex' : 'none';\n        if (searchInp) searchInp.placeholder = n > 0 ? '\u7ee7\u7eed\u6dfb\u52a0\u7528\u6237\u540d\u3001\u7fa4\u7ec4\u6216\u90e8\u95e8' : '\u641c\u7d22\u7528\u6237\u540d\u3001\u7fa4\u7ec4\u6216\u90e8\u95e8';\n        renderChips();\n      }\n\n      function openDropdown(q) {\n        var ql = q.toLowerCase();\n        var joined = getJoinedItems().filter(function(p) {\n          return p.name.toLowerCase().includes(ql) || p.sub.toLowerCase().includes(ql);\n        });\n        var joinedNames = joined.map(function(p) { return p.name; });\n        var invitable = contacts.filter(function(c) {\n          return (c.name.toLowerCase().includes(ql) || c.sub.toLowerCase().includes(ql))\n            && !joinedNames.includes(c.name) && !selected[c.name];\n        });\n\n        if (!invitable.length && !joined.length) {\n          results.innerHTML = '<div style=\"padding:16px 8px;text-align:center;font-size:var(--kd-font-size-sub-base);color:var(--kd-color-text-tertiary)\">\u672a\u627e\u5230\u5339\u914d\u7684\u8054\u7cfb\u4eba</div>';\n          dropdown.style.display = 'block';\n          return;\n        }\n\n        function renderRow(p, isJoined) {\n          var permText = isJoined ? (permMap[p.perm] || p.perm) : '';\n          return '<div class=\"sp-cpanel-item add-collab-row\" data-name=\"' + p.name + '\" data-bg=\"' + p.bg + '\" data-char=\"' + p.char + '\" data-is-joined=\"' + isJoined + '\" style=\"cursor:' + (isJoined ? 'default' : 'pointer') + '\">'\n            + '<div class=\"sp-cpanel-item__row\">'\n            + '<span class=\"sp-cpanel-item__avatar\" style=\"background:' + p.bg + '\">' + p.char + '</span>'\n            + '<div class=\"sp-cpanel-item__info\">'\n            + '<div class=\"sp-cpanel-item__name\">' + highlight(p.name, q) + '</div>'\n            + '<div class=\"sp-cpanel-item__sub\">' + highlight(p.sub, q) + '</div>'\n            + '</div>'\n            + (isJoined && permText ? '<span class=\"sp-cpanel-item__perm-text\" style=\"display:inline-flex !important;font-size:var(--kd-font-size-small);color:var(--kd-color-text-secondary);white-space:nowrap\">\u5df2\u6388\u4e88' + permText + '\u6743\u9650</span>' : '')\n            + '</div>'\n            + '<div class=\"sp-cpanel-item__sep\"></div>'\n            + '</div>';\n        }\n\n        var html = '';\n        invitable.forEach(function(p) { html += renderRow(p, false); });\n        if (joined.length) {\n          joined.forEach(function(p) { html += renderRow(p, true); });\n        }\n        results.innerHTML = html;\n        dropdown.style.display = 'block';\n      }\n\n      function closeDropdown() {\n        dropdown.style.display = 'none';\n        results.innerHTML = '';\n      }\n\n\n\n      // \u786e\u5b9a\u6309\u94ae\uff1a\u5173\u95ed\u9762\u677f + toast\n      document.getElementById('addCollabConfirm').addEventListener('click', function() {\n        var names = Object.keys(selected);\n        if (!names.length) return;\n        var panel = document.getElementById('addCollabPanel');\n        panel.classList.remove('is-open');\n        var permText = document.getElementById('addCollabPermBtn').querySelector('.kd-button-children').textContent.trim();\n        var msg = names.length === 1\n          ? '\u5df2\u6dfb\u52a0 ' + names[0] + ' \u52a0\u5165\u534f\u4f5c\uff0c\u6743\u9650\uff1a' + permText\n          : '\u5df2\u6dfb\u52a0 ' + names.length + ' \u4f4d\u534f\u4f5c\u8005\uff0c\u6743\u9650\uff1a' + permText;\n        showKdToast('success', msg);\n        // \u91cd\u7f6e\u72b6\u6001\n        selected = {};\n        inp.value = '';\n        if (clearBtn) clearBtn.style.display = 'none';\n        renderChips();\n        updateCount();\n        closeDropdown();\n      });\n\n      // \u70b9\u51fb\u7ed3\u679c\u884c\uff1a\u9009\u4e2d\u540e\u843d\u5165 chips\n      results.addEventListener('click', function(e) {\n        var row = e.target.closest('.add-collab-row');\n        if (!row || row.dataset.isJoined === 'true') return;\n        var name = row.dataset.name;\n        var contact = contacts.find(function(c) { return c.name === name; });\n        if (!contact || selected[name]) return;\n        selected[name] = contact;\n        updateCount();\n        // \u6e05\u7a7a\u641c\u7d22\u6846\uff0c\u5173\u95ed\u6d6e\u5c42\n        inp.value = '';\n        if (clearBtn) clearBtn.style.display = 'none';\n        closeDropdown();\n        inp.focus();\n      });\n\n      // chip \u00d7 \u5220\u9664\n      document.addEventListener('click', function(e) {\n        var btn = e.target.closest('[data-chip-remove]');\n        if (!btn) return;\n        var name = btn.dataset.chipRemove;\n        if (selected[name]) { delete selected[name]; updateCount(); }\n      });\n\n      // \u8f93\u5165\u76d1\u542c\n      inp.addEventListener('input', function() {\n        var q = inp.value.trim();\n        if (clearBtn) clearBtn.style.display = q ? 'flex' : 'none';\n        if (q) { openDropdown(q); } else { closeDropdown(); }\n      });\n\n      // \u6e05\u9664\n      clearBtn && clearBtn.addEventListener('click', function() {\n        inp.value = '';\n        clearBtn.style.display = 'none';\n        closeDropdown();\n        inp.focus();\n      });\n\n      // \u70b9\u51fb\u6d6e\u5c42\u5916\u5173\u95ed\n      document.addEventListener('click', function(e) {\n        if (!dropdown.contains(e.target) && e.target !== inp && !inp.contains(e.target)) {\n          closeDropdown();\n        }\n      });\n\n      // hover \u6548\u679c\n      results.addEventListener('mouseover', function(e) {\n        var row = e.target.closest('.add-collab-row[data-is-joined=\"false\"]');\n        if (row) row.style.background = 'var(--kd-color-state-hover)';\n      });\n      results.addEventListener('mouseout', function(e) {\n        var row = e.target.closest('.add-collab-row');\n        if (row) row.style.background = '';\n      });\n    })();\n    <\/script>\n    <script>\n    // \u2500\u2500 \u901a\u8baf\u5f55\u5bf9\u8bdd\u6846 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    (function() {\n      var allContacts = {\n        recent: [\n          { name:'\u738b\u6d69',   sub:'\u91d1\u5c71\u529e\u516c/\u7814\u53d1\u90e8',        bg:'#74B9FF', char:'\u738b' },\n          { name:'\u5b59\u742a\u742a', sub:'\u91d1\u5c71\u529e\u516c/\u8bbe\u8ba1\u4e2d\u5fc3',      bg:'#F4A261', char:'\u5b59' },\n          { name:'\u674e\u4f1f\u679d', sub:'\u91d1\u5c71\u529e\u516c/AI\u4e8b\u4e1a\u90e8',       bg:'#6C5CE7', char:'\u674e' }\n        ],\n        contacts: [\n          { name:'\u674e\u4f73\u742a', sub:'\u91d1\u5c71\u529e\u516c/AI\u4e8b\u4e1a\u90e8/\u7b97\u6cd5\u7ec4', bg:'#F4A261', char:'\u674e' },\n          { name:'\u738b\u5b50\u8f69', sub:'\u91d1\u5c71\u529e\u516c/AI\u4e8b\u4e1a\u90e8/\u4ea7\u54c1\u7ec4', bg:'#4ECDC4', char:'\u738b' },\n          { name:'\u5f20\u96c5\u5a77', sub:'\u91d1\u5c71\u529e\u516c/\u8bbe\u8ba1\u4e2d\u5fc3',        bg:'#6C5CE7', char:'\u5f20' },\n          { name:'\u9648\u6d69\u7136', sub:'\u91d1\u5c71\u529e\u516c/\u7814\u53d1\u90e8/\u524d\u7aef\u7ec4',   bg:'#A8DADC', char:'\u9648' },\n          { name:'\u5218\u601d\u601d', sub:'\u91d1\u5c71\u529e\u516c/\u5e02\u573a\u90e8',           bg:'#E17055', char:'\u5218' },\n          { name:'\u8d75\u660e\u8fdc', sub:'\u91d1\u5c71\u529e\u516c/\u7814\u53d1\u90e8/\u540e\u7aef\u7ec4',   bg:'#74B9FF', char:'\u8d75' },\n          { name:'\u5b59\u5c0f\u96e8', sub:'\u91d1\u5c71\u529e\u516c/AI\u4e8b\u4e1a\u90e8/\u5de5\u7a0b\u7ec4', bg:'#55EFC4', char:'\u5b59' },\n          { name:'\u5468\u5fd7\u5f3a', sub:'\u91d1\u5c71\u529e\u516c/\u8fd0\u8425\u90e8',           bg:'#FDCB6E', char:'\u5468' }\n        ],\n        wechat: [\n          { name:'\u738b\u6d69',   sub:'\u5fae\u4fe1\u597d\u53cb',  bg:'#74B9FF', char:'\u738b' },\n          { name:'\u5f20\u96c5\u5a77', sub:'\u5fae\u4fe1\u597d\u53cb',  bg:'#6C5CE7', char:'\u5f20' }\n        ]\n      };\n\n      var overlay      = document.getElementById('addrBookOverlay');\n      var listEl       = document.getElementById('addrBookList');\n      var selListEl    = document.getElementById('addrBookSelectedList');\n      var emptyRight   = document.getElementById('addrBookRightEmpty');\n      var searchEl     = document.getElementById('addrBookSearch');\n      var clearBtn     = document.getElementById('addrBookSearchClear');\n      var confirmBtn   = document.getElementById('addrBookConfirm');\n      var cancelBtn    = document.getElementById('addrBookCancel');\n      var closeBtn     = document.getElementById('addrBookClose');\n      var tabsEl       = document.getElementById('addrBookTabs');\n\n      var addrSelected = {};\n      var currentTab   = 'recent';\n\n      function avatarEl(c, size) {\n        size = size || 32;\n        return '<span style=\"width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + c.bg + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:' + Math.round(size*0.4) + 'px;color:#fff;font-weight:500\">' + c.char + '</span>';\n      }\n\n      function renderList(q) {\n        var source = allContacts[currentTab] || [];\n        var filtered = source.filter(function(c) {\n          if (!q) return true;\n          return c.name.indexOf(q) !== -1 || c.sub.indexOf(q) !== -1;\n        });\n        if (!filtered.length) {\n          listEl.innerHTML = '<div style=\"padding:24px 0;text-align:center;font-size:var(--kd-font-size-sub-base);color:var(--kd-color-text-tertiary)\">\u6682\u65e0\u6570\u636e</div>';\n          return;\n        }\n        listEl.innerHTML = filtered.map(function(c) {\n          var checked = addrSelected[c.name] ? 'is-checked' : '';\n          var checkedAttr = addrSelected[c.name] ? 'checked' : '';\n          return '<label class=\"addr-book-item\" data-name=\"' + c.name + '\" style=\"display:flex;align-items:center;gap:10px;padding:8px 4px;cursor:pointer;border-radius:var(--kd-radius-sm)\">' +\n            '<span class=\"kd-checkbox-input ' + checked + '\" style=\"flex-shrink:0\">' +\n              '<span class=\"kd-checkbox-inner\"></span>' +\n              '<input type=\"checkbox\" class=\"kd-checkbox-original\" ' + checkedAttr + '>' +\n            '</span>' +\n            avatarEl(c, 32) +\n            '<span style=\"font-size:var(--kd-font-size-base);color:var(--kd-color-text-primary)\">' + c.name + '</span>' +\n          '</label>';\n        }).join('');\n      }\n\n      function renderRight() {\n        var names = Object.keys(addrSelected);\n        if (!names.length) {\n          emptyRight.style.display = 'flex';\n          selListEl.style.display = 'none';\n          confirmBtn.disabled = true;\n          return;\n        }\n        emptyRight.style.display = 'none';\n        selListEl.style.display = 'block';\n        confirmBtn.disabled = false;\n        selListEl.innerHTML = names.map(function(n) {\n          var c = addrSelected[n];\n          return '<div class=\"addr-right-item\">' +\n            avatarEl(c, 28) +\n            '<span style=\"flex:1;font-size:var(--kd-font-size-base);color:var(--kd-color-text-primary)\">' + c.name + '</span>' +\n            '<button data-remove=\"' + n + '\" style=\"background:none;border:none;cursor:pointer;padding:2px;color:var(--kd-color-text-tertiary)\">' +\n              '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><circle cx=\"7\" cy=\"7\" r=\"7\" fill=\"#C2C2C2\"/><path d=\"M4.5 4.5L9.5 9.5M9.5 4.5L4.5 9.5\" stroke=\"white\" stroke-width=\"1.2\" stroke-linecap=\"round\"/></svg>' +\n            '</button>' +\n          '</div>';\n        }).join('');\n      }\n\n      function openAddrBook() {\n        addrSelected = {};\n        currentTab = 'recent';\n        searchEl.value = '';\n        clearBtn.style.display = 'none';\n        tabsEl.querySelectorAll('.addr-tab').forEach(function(t) {\n          t.classList.remove('addr-tab-active');\n          t.style.color = 'var(--kd-color-text-secondary)';\n          if (t.dataset.tab === 'recent') { t.classList.add('addr-tab-active'); t.style.color = ''; }\n        });\n        renderList('');\n        renderRight();\n        overlay.style.display = 'flex';\n        requestAnimationFrame(function() { searchEl.focus(); });\n      }\n\n      function closeAddrBook() { overlay.style.display = 'none'; }\n\n      window.openAddrBook = openAddrBook;\n\n      // \u6807\u7b7e\u5207\u6362\n      tabsEl.addEventListener('click', function(e) {\n        var tab = e.target.closest('.addr-tab');\n        if (!tab) return;\n        currentTab = tab.dataset.tab;\n        tabsEl.querySelectorAll('.addr-tab').forEach(function(t) {\n          t.classList.remove('addr-tab-active');\n          t.style.color = 'var(--kd-color-text-secondary)';\n        });\n        tab.classList.add('addr-tab-active');\n        tab.style.color = '';\n        renderList(searchEl.value.trim());\n      });\n\n      // \u5217\u8868\u70b9\u51fb\u9009\u4e2d\n      listEl.addEventListener('click', function(e) {\n        var item = e.target.closest('.addr-book-item');\n        if (!item) return;\n        var name = item.dataset.name;\n        if (addrSelected[name]) {\n          delete addrSelected[name];\n        } else {\n          var source = allContacts[currentTab] || [];\n          var c = source.find(function(x) { return x.name === name; });\n          if (c) addrSelected[name] = c;\n        }\n        renderList(searchEl.value.trim());\n        renderRight();\n      });\n\n      // \u53f3\u4fa7\u79fb\u9664\n      selListEl.addEventListener('click', function(e) {\n        var btn = e.target.closest('[data-remove]');\n        if (!btn) return;\n        delete addrSelected[btn.dataset.remove];\n        renderList(searchEl.value.trim());\n        renderRight();\n      });\n\n      // \u641c\u7d22\n      searchEl.addEventListener('input', function() {\n        var q = searchEl.value.trim();\n        clearBtn.style.display = q ? 'flex' : 'none';\n        renderList(q);\n      });\n      clearBtn.addEventListener('click', function() {\n        searchEl.value = '';\n        clearBtn.style.display = 'none';\n        renderList('');\n        searchEl.focus();\n      });\n\n      closeBtn.addEventListener('click', closeAddrBook);\n      cancelBtn.addEventListener('click', closeAddrBook);\n      overlay.addEventListener('click', function(e) { if (e.target === overlay) closeAddrBook(); });\n\n      confirmBtn.addEventListener('click', function() {\n        var names = Object.keys(addrSelected);\n        if (!names.length) return;\n        closeAddrBook();\n        showKdToast('success', '\u5df2\u4ece\u901a\u8baf\u5f55\u6dfb\u52a0 ' + names.length + ' \u4f4d\u534f\u4f5c\u8005');\n      });\n    })();\n    \n\n\n  document.querySelectorAll('.ver-item').forEach(function(item) {\n    item.addEventListener('click', function() {\n      document.querySelectorAll('.ver-item').forEach(function(i) { i.classList.remove('is-active'); });\n      item.classList.add('is-active');\n      var sceneName = item.querySelector('.ver-item__name').textContent.trim();\n      var panelDefault = document.getElementById('mainSharePanel');\n      var panelEmpty   = document.getElementById('emptyStatePanel');\n      panelDefault.style.display = (sceneName === 'PC-\u9ed8\u8ba4')   ? '' : 'none';\n      panelEmpty.style.display   = (sceneName === 'PC-\u7a7a\u72b6\u6001') ? '' : 'none';\n      var webScene = document.getElementById('webSidebarScene');\n      if (webScene) webScene.classList.toggle('is-visible', sceneName === 'web-\u4fa7\u8fb9\u680f');\nvar mobileScene = document.getElementById('mobileScene');\nif (mobileScene) mobileScene.classList.toggle('is-visible', sceneName === '\u79fb\u52a8\u7aef');\n    });\n  });\n<\/script>\n\n<!-- PC-\u7a7a\u72b6\u6001 \u9762\u677f\u4e13\u5c5e\u811a\u672c -->\n<script>\n    // \u2500\u2500 \u4e3b\u9762\u677f\u641c\u7d22\u6846\uff1a\u70b9\u51fb\u89e6\u53d1\u6dfb\u52a0\u534f\u4f5c\u8005\u9762\u677f\uff08FLIP \u52a8\u753b\uff09\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    (function() {\n      var trigger = document.getElementById('mainSearchInput-empty');\n      var row     = document.getElementById('mainSearchRow-empty');\n      if (!trigger) return;\n\n      function openWithFlip() {\n        var panel     = document.getElementById('addCollabPanel-empty');\n        var subSearch = document.getElementById('addCollabSearchWrap-empty');\n        var subInput  = document.getElementById('addCollabSearchInput-empty');\n        if (!panel || !subSearch) return;\n\n        var wrap = row ? row.querySelector('.kd-input-wrap') : trigger;\n        var fromRect = (wrap || trigger).getBoundingClientRect();\n\n        // \u53d6\u6d88 panel \u6574\u4f53\u52a8\u753b\uff0c\u6539\u4e3a\u624b\u52a8\u63a7\u5236\u6240\u6709\u5b50\u5143\u7d20\n        panel.style.animation = 'none';\n        panel.classList.add('is-open');\n\n        // \u6240\u6709\u9664\u641c\u7d22\u6846\u5916\u7684\u76f4\u63a5\u5b50\u5143\u7d20\u521d\u59cb\u900f\u660e\n        var otherChildren = Array.prototype.filter.call(panel.children, function(c) {\n          return c !== subSearch && !c.contains(subSearch);\n        });\n        otherChildren.forEach(function(c) {\n          c.style.opacity = '0';\n          c.style.transition = 'none';\n        });\n\n        // \u641c\u7d22\u6846\u4ece\u4e0b\u65b9\u6de1\u5165\n        subSearch.style.transition = 'none';\n        subSearch.style.transform  = 'translateY(12px)';\n        subSearch.style.opacity    = '0.6';\n\n        requestAnimationFrame(function() {\n          requestAnimationFrame(function() {\n            // \u641c\u7d22\u6846\u52a8\u753b\n            subSearch.style.transition = 'transform 200ms var(--kd-easing-ease), opacity 160ms ease';\n            subSearch.style.transform  = 'translateY(0)';\n            subSearch.style.opacity    = '1';\n            // \u5176\u4f59\u5185\u5bb9\u540c\u6b65\u6de1\u5165\n            otherChildren.forEach(function(c) {\n              c.style.transition = 'opacity 180ms ease';\n              c.style.opacity    = '1';\n            });\n            subSearch.addEventListener('transitionend', function cleanup(e) {\n              if (e.propertyName !== 'opacity') return;\n              subSearch.removeEventListener('transitionend', cleanup);\n              subSearch.style.transition = '';\n              subSearch.style.transform  = '';\n              subSearch.style.opacity    = '';\n              otherChildren.forEach(function(c) { c.style.transition = ''; c.style.opacity = ''; });\n              if (subInput) subInput.focus();\n            });\n          });\n        });\n      }\n\n      trigger.addEventListener('click', openWithFlip);\n      if (row) row.addEventListener('click', function(e) {\n        var addrBtn = document.getElementById('mainSearchAddrBtn-empty');\n        if (addrBtn && (e.target === addrBtn || addrBtn.contains(e.target))) return;\n        if (e.target !== trigger) openWithFlip();\n      });\n      // \u901a\u8baf\u5f55\u6309\u94ae\uff1a\u6253\u5f00\u901a\u8baf\u5f55\u5bf9\u8bdd\u6846\n      var addrBtn = document.getElementById('mainSearchAddrBtn-empty');\n      if (addrBtn) addrBtn.addEventListener('click', function(e) {\n        e.stopPropagation();\n        openAddrBook();\n      });\n    })();\n    <\/script>\n<script>\n    // \u2500\u2500 \u6dfb\u52a0\u534f\u4f5c\u8005\uff1a\u641c\u7d22 + \u9009\u4eba\u903b\u8f91 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    (function() {\n      var contacts = [\n        { name:'\u674e\u4f73\u742a', sub:'\u91d1\u5c71\u529e\u516c/AI\u4e8b\u4e1a\u90e8/\u7b97\u6cd5\u7ec4', bg:'#F4A261', char:'\u674e' },\n        { name:'\u738b\u5b50\u8f69', sub:'\u91d1\u5c71\u529e\u516c/\u4ea7\u54c1\u4e2d\u5fc3/\u4f53\u9a8c\u8bbe\u8ba1', bg:'#6C63FF', char:'\u738b' },\n        { name:'\u9648\u601d\u8fdc', sub:'\u91d1\u5c71\u529e\u516c/\u7814\u53d1\u4e2d\u5fc3/\u524d\u7aef\u7ec4', bg:'#2DBB7C', char:'\u9648' },\n        { name:'\u5f20\u6893\u742a', sub:'\u91d1\u5c71\u529e\u516c/\u5e02\u573a\u90e8/\u54c1\u724c\u7ec4', bg:'#E76F51', char:'\u5f20' },\n        { name:'\u6797\u6653\u5f64', sub:'\u91d1\u5c71\u529e\u516c/AI\u4e8b\u4e1a\u90e8/NLP\u7ec4', bg:'#0A6CFF', char:'\u6797' },\n        { name:'\u5468\u601d\u7426', sub:'\u91d1\u5c71\u529e\u516c/\u7814\u53d1\u4e2d\u5fc3/\u540e\u7aef\u7ec4', bg:'#E9C46A', char:'\u5468' },\n        { name:'\u5434\u4f73\u742a', sub:'\u91d1\u5c71\u529e\u516c/\u4ea7\u54c1\u4e2d\u5fc3/\u589e\u957f\u7ec4', bg:'#9B2335', char:'\u5434' },\n        { name:'\u8d75\u4e00\u9e23', sub:'\u91d1\u5c71\u529e\u516c/AI\u4e8b\u4e1a\u90e8/\u89c6\u89c9AI\u7ec4', bg:'#457B9D', char:'\u8d75' },\n        { name:'\u5b59\u96e8\u742a', sub:'\u91d1\u5c71\u529e\u516c/\u7814\u53d1\u4e2d\u5fc3/\u79fb\u52a8\u7ec4', bg:'#E63946', char:'\u5b59' },\n        { name:'\u94b1\u6653\u78ca', sub:'\u91d1\u5c71\u529e\u516c/\u5e02\u573a\u90e8/\u589e\u957f\u8fd0\u8425', bg:'#2A9D8F', char:'\u94b1' },\n      ];\n\n      var permMap = { readonly:'\u4ec5\u67e5\u770b', view:'\u53ef\u67e5\u770b', comment:'\u53ef\u8bc4\u8bba', edit:'\u53ef\u7f16\u8f91', manage:'\u53ef\u7ba1\u7406' };\n      var selected = {};\n\n      var inp       = document.getElementById('addCollabSearchInput-empty');\n      var clearBtn  = document.getElementById('addCollabSearchClear-empty');\n      var dropdown  = document.getElementById('addCollabDropdown-empty');\n      var results   = document.getElementById('addCollabResults-empty');\n      var countEl   = document.getElementById('addCollabSelectedCount-empty');\n      var confirmBtn= document.getElementById('addCollabConfirm-empty');\n      var chipsList = document.getElementById('addCollabChipsList-empty');\n      var emptyHint = document.getElementById('addCollabEmptyHint-empty');\n      if (!inp) return;\n\n      function highlight(text, q) {\n        if (!q) return text;\n        var idx = text.toLowerCase().indexOf(q.toLowerCase());\n        if (idx < 0) return text;\n        return text.slice(0, idx)\n          + '<span style=\"color:var(--kd-color-public-normal)\">' + text.slice(idx, idx + q.length) + '</span>'\n          + text.slice(idx + q.length);\n      }\n\n      function getJoinedItems() {\n        var list = document.getElementById('collabList-empty');\n        if (!list) return [];\n        return Array.from(list.querySelectorAll('.sp-cpanel-item')).map(function(item) {\n          var nameEl   = item.querySelector('.sp-cpanel-item__name');\n          var subEl    = item.querySelector('.sp-cpanel-item__sub');\n          var avatarEl = item.querySelector('.sp-cpanel-item__avatar');\n          return {\n            name: nameEl ? (nameEl.firstChild && nameEl.firstChild.nodeType===3 ? nameEl.firstChild.textContent.trim() : nameEl.textContent.trim()) : '',\n            sub:  subEl  ? subEl.textContent.trim() : '',\n            bg:   avatarEl ? (avatarEl.style.background || '#999') : '#999',\n            char: avatarEl ? avatarEl.textContent.trim() : '?',\n            perm: item.dataset.perm || ''\n          };\n        });\n      }\n\n      function renderChips() {\n        var keys = Object.keys(selected);\n        emptyHint.style.display = keys.length ? 'none' : 'flex';\n        chipsList.innerHTML = keys.map(function(name, idx) {\n          var p = selected[name];\n          var isLast = idx === keys.length - 1;\n          return '<div class=\"sp-cpanel-item\" style=\"padding-left:12px;padding-right:12px;cursor:default\">'\n            + '<div class=\"sp-cpanel-item__row\" style=\"padding:10px 0\">'\n            + '<span class=\"sp-cpanel-item__avatar\" style=\"background:' + p.bg + '\">' + p.char + '</span>'\n            + '<div class=\"sp-cpanel-item__info\">'\n            + '<div class=\"sp-cpanel-item__name\">' + p.name + '</div>'\n            + '<div class=\"sp-cpanel-item__sub\">' + p.sub + '</div>'\n            + '</div>'\n            + '<button data-chip-remove=\"' + name + '\" style=\"display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border:none;background:none;cursor:pointer;color:var(--kd-color-text-tertiary);flex-shrink:0;border-radius:var(--kd-radius-base)\">'\n            + '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M3 3l8 8M11 3l-8 8\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"/></svg>'\n            + '</button>'\n            + '</div>'\n            + (isLast ? '' : '<div class=\"sp-cpanel-item__sep\" style=\"margin-left:36px\"></div>')\n            + '</div>';\n        }).join('');\n      }\n\n      function updateCount() {\n        var n = Object.keys(selected).length;\n        if (countEl) countEl.textContent = '(' + n + ')';\n        if (confirmBtn) confirmBtn.disabled = n === 0;\n        var selRow = document.getElementById('addCollabSelectedRow');\n        var notifyLabel = document.getElementById('addCollabNotifyLabel-empty');\n        var footer = document.getElementById('addCollabFooter');\n        var searchInp = document.getElementById('addCollabSearchInput-empty');\n        if (selRow) selRow.style.display = n > 0 ? 'flex' : 'none';\n        if (notifyLabel) notifyLabel.style.display = n > 0 ? '' : 'none';\n        if (footer) footer.style.display = n > 0 ? 'flex' : 'none';\n        if (searchInp) searchInp.placeholder = n > 0 ? '\u7ee7\u7eed\u6dfb\u52a0\u7528\u6237\u540d\u3001\u7fa4\u7ec4\u6216\u90e8\u95e8' : '\u641c\u7d22\u7528\u6237\u540d\u3001\u7fa4\u7ec4\u6216\u90e8\u95e8';\n        renderChips();\n      }\n\n      function openDropdown(q) {\n        var ql = q.toLowerCase();\n        var joined = getJoinedItems().filter(function(p) {\n          return p.name.toLowerCase().includes(ql) || p.sub.toLowerCase().includes(ql);\n        });\n        var joinedNames = joined.map(function(p) { return p.name; });\n        var invitable = contacts.filter(function(c) {\n          return (c.name.toLowerCase().includes(ql) || c.sub.toLowerCase().includes(ql))\n            && !joinedNames.includes(c.name) && !selected[c.name];\n        });\n\n        if (!invitable.length && !joined.length) {\n          results.innerHTML = '<div style=\"padding:16px 8px;text-align:center;font-size:var(--kd-font-size-sub-base);color:var(--kd-color-text-tertiary)\">\u672a\u627e\u5230\u5339\u914d\u7684\u8054\u7cfb\u4eba</div>';\n          dropdown.style.display = 'block';\n          return;\n        }\n\n        function renderRow(p, isJoined) {\n          var permText = isJoined ? (permMap[p.perm] || p.perm) : '';\n          return '<div class=\"sp-cpanel-item add-collab-row\" data-name=\"' + p.name + '\" data-bg=\"' + p.bg + '\" data-char=\"' + p.char + '\" data-is-joined=\"' + isJoined + '\" style=\"cursor:' + (isJoined ? 'default' : 'pointer') + '\">'\n            + '<div class=\"sp-cpanel-item__row\">'\n            + '<span clas "' + permVal + '\" data-fixed=\"' + isFixed + '\" data-orig-idx=\"' + origIdx + '\">'\n            + '<div class=\"sp-cpanel-item__row\">'\n            + '<span class=\"sp-cpanel-item__avatar\" style=\"' + avatarStyle + '\">' + avatarChar + '</span>'\n            + '<div class=\"sp-cpanel-item__info\">'\n            + '<div class=\"sp-cpanel-item__name\">' + nameText + '</div>'\n            + (subText ? '<div class=\"sp-cpanel-item__sub\">' + subText + '</div>' : '')\n            + '</div>'\n            + rightHtml\n            + '</div>'\n            + '<div class=\"sp-cpanel-item__sep\"></div>'\n            + '</div>';\n        }).join('');\n      }\n\n      function setSearchActive(active) {\n        // \u9690\u85cf/\u663e\u793a\u539f\u59cb\u884c\uff08\u6587\u6863\u521b\u5efa\u8005\u3001\u590f\u5de6\u5de6\u3001\u7ba1\u7406\u534f\u4f5c\u8005\uff09\n        var rows = collab ? Array.from(collab.querySelectorAll('.sp-row, .sp-mgmt-row')) : [];\n        rows.forEach(function(r) { r.style.display = active ? 'none' : ''; });\n        results.style.display = active ? 'block' : 'none';\n        if (addrBtn) addrBtn.style.display = active ? 'none' : '';\n      }\n\n      input.addEventListener('input', function() {\n        var q = input.value;\n        clear.style.display = q ? 'inline-flex' : 'none';\n        if (q.trim()) {\n          setSearchActive(true);\n          renderResults(q);\n        } else {\n          setSearchActive(false);\n        }\n      });\n\n      clear.addEventListener('click', function() {\n        input.value = '';\n        clear.style.display = 'none';\n        setSearchActive(false);\n        input.focus();\n      });\n    })();\n\n    // \u2500\u2500 \u5355\u9879\u6743\u9650\u4e0b\u62c9\u83dc\u5355 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    (function() {\n      var menu = document.getElementById('itemPermMenu-web');\n      var currentRow = null;\n      var permMap = { readonly:'\u4ec5\u67e5\u770b', view:'\u53ef\u67e5\u770b', comment:'\u53ef\u8bc4\u8bba', edit:'\u53ef\u7f16\u8f91', manage:'\u53ef\u7ba1\u7406' };\n\n      function openItemMenu(btn, row) {\n        currentRow = row;\n        // \u9ad8\u4eae\u5f53\u524d\u6743\u9650\n        var curPerm = row.dataset.perm;\n        menu.querySelectorAll('.kd-menu-item[data-perm-val]').forEach(function(li) {\n          var check = li.querySelector('.item-perm-check');\n          if (!check) return;\n          check.style.visibility = li.dataset.permVal === curPerm ? 'visible' : 'hidden';\n        });\n        // \u5b9a\u4f4d\uff1a\u7d27\u8d34\u6309\u94ae\u53f3\u4e0b\n        var rect = btn.getBoundingClientRect();\n        menu.style.display = 'block';\n        var menuW = menu.offsetWidth || 220;\n        var left = rect.right - menuW;\n        if (left < 8) left = 8;\n        menu.style.left = left + 'px';\n        // \u5e95\u90e8\u6ea2\u51fa\u65f6\u5411\u4e0a\u7ffb\u8f6c\n        var menuH = menu.offsetHeight || 160;\n        var spaceBelow = window.innerHeight - rect.bottom;\n        menu.style.top = (spaceBelow >= menuH + 8\n          ? rect.bottom + 4\n          : rect.top - menuH - 4) + 'px';\n        btn.classList.add('is-active');\n      }\n\n      function closeItemMenu() {\n        menu.style.display = 'none';\n        if (currentRow) {\n          var btn = currentRow.querySelector('.sp-cpanel-item__perm');\n          if (btn) btn.classList.remove('is-active');\n        }\n        currentRow = null;\n      }\n\n      // \u70b9\u51fb perm \u6309\u94ae\uff08\u4ee3\u7406\u5230 document\uff0c\u652f\u6301\u4e3b\u9762\u677f\u641c\u7d22\u7ed3\u679c\u884c\uff09\n      document.addEventListener('click', function(e) {\n        var btn = e.target.closest('.sp-cpanel-item__perm');\n        if (!btn) return;\n        var list = document.getElementById('collabList-web');\n        if (!list || !list.contains(btn)) return; // \u53ea\u54cd\u5e94\u672c\u9762\u677f\u7684\u6309\u94ae\n        if (list.classList.contains('is-bulk')) return; // \u6279\u91cf\u6a21\u5f0f\u4e0d\u89e6\u53d1\n        var row = btn.closest('.sp-cpanel-item');\n        if (!row) return;\n        e.stopPropagation();\n        if (menu.style.display !== 'none' && currentRow === row) {\n          closeItemMenu();\n        } else {\n          closeItemMenu();\n          openItemMenu(btn, row);\n        }\n      });\n\n      // \u70b9\u51fb\u83dc\u5355\u9879\n      menu.addEventListener('click', function(e) {\n        var li = e.target.closest('.kd-menu-item[data-perm-val]');\n        if (!li || !currentRow) return;\n        var permVal = li.dataset.permVal;\n        var row = currentRow;\n        closeItemMenu();\n\n        // \u627e\u5230\u539f\u59cb\u5217\u8868\u884c\uff08\u641c\u7d22\u7ed3\u679c\u884c\u901a\u8fc7 data-orig-idx \u5173\u8054\uff09\n        var origRow = row;\n        var origIdx = row.dataset.origIdx;\n        if (origIdx !== undefined) {\n          var allItems = document.querySelectorAll('#collabList-web .sp-cpanel-item');\n          if (allItems[origIdx]) origRow = allItems[origIdx];\n        }\n\n        if (permVal === 'remove') {\n          var nameNode = (row.querySelector('.sp-cpanel-item__name') || {}).firstChild;\n          var nameText = nameNode ? nameNode.textContent.trim() : '\u8be5\u6210\u5458';\n          // \u9690\u85cf\u641c\u7d22\u7ed3\u679c\u884c\n          row.style.display = 'none';\n          // \u540c\u6b65\u9690\u85cf\u539f\u59cb\u5217\u8868\u884c\n          if (origRow !== row) {\n            origRow.style.display = 'none';\n            var origSep = origRow.querySelector('.sp-cpanel-item__sep');\n            if (origSep) origSep.style.display = 'none';\n          } else {\n            var sep = row.nextElementSibling;\n            if (sep && sep.classList.contains('sp-cpanel-item__sep')) sep.style.display = 'none';\n          }\n          showKdToast('success', '\u5df2\u79fb\u51fa ' + nameText);\n        } else {\n          var newPermText = permMap[permVal] || permVal;\n          // \u66f4\u65b0\u5f53\u524d\u884c\uff08\u53ef\u80fd\u662f\u641c\u7d22\u7ed3\u679c\u884c\uff09\n          var permBtn = row.querySelector('.sp-cpanel-item__perm');\n          if (permBtn) permBtn.firstChild.textContent = newPermText;\n          row.dataset.perm = permVal;\n          // \u540c\u6b65\u66f4\u65b0\u539f\u59cb\u5217\u8868\u884c\n          if (origRow !== row) {\n            var origPermBtn = origRow.querySelector('.sp-cpanel-item__perm');\n            if (origPermBtn) origPermBtn.firstChild.textContent = newPermText;\n            origRow.dataset.perm = permVal;\n          }\n          showKdToast('success', '\u5df2\u8c03\u6574\u4e3a' + newPermText);\n        }\n      });\n\n      // \u70b9\u51fb\u5916\u90e8\u5173\u95ed\n      document.addEventListener('click', function(e) {\n        if (menu.style.display === 'none') return;\n        if (e.target.closest('.sp-cpanel-item__perm')) return; // perm\u6309\u94ae\u70b9\u51fb\u7531\u4e13\u5c5ehandler\u5904\u7406\n        if (!menu.contains(e.target)) closeItemMenu();\n      });\n    })();\n\n    function initTooltip() {\n    var tip = document.getElementById('kd-float-tooltip');\n    if (!tip) return;\n    var mx = 0, my = 0;\n    document.addEventListener('mousemove', function(e) {\n      mx = e.clientX; my = e.clientY;\n      if (tip.style.opacity === '1') {\n        tip.style.left = (mx + 14) + 'px';\n        tip.style.top  = (my + 16) + 'px';\n      }\n    });\n    document.querySelectorAll('[data-tip]').forEach(function(el) {\n      el.addEventListener('mouseenter', function() {\n        var list = document.getElementById('collabList-web');\n        if (!list || !list.classList.contains('is-bulk')) return;\n        tip.textContent = el.dataset.tip;\n        tip.style.left = (mx + 14) + 'px';\n        tip.style.top  = (my + 16) + 'px';\n        tip.style.opacity = '1';\n      });\n      el.addEventListener('mouseleave', function() {\n        tip.style.opacity = '0';\n      });\n    });\n  }\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', initTooltip);\n  } else {\n    initTooltip();\n  }\n})();\n<\/script>\n\n    \n\n    <script>\n    // \u2500\u2500 \u6dfb\u52a0\u534f\u4f5c\u8005\uff1a\u641c\u7d22 + \u9009\u4eba\u903b\u8f91 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    (function() {\n      var contacts = [\n        { name:'\u674e\u4f73\u742a', sub:'\u91d1\u5c71\u529e\u516c/AI\u4e8b\u4e1a\u90e8/\u7b97\u6cd5\u7ec4', bg:'#F4A261', char:'\u674e' },\n        { name:'\u738b\u5b50\u8f69', sub:'\u91d1\u5c71\u529e\u516c/\u4ea7\u54c1\u4e2d\u5fc3/\u4f53\u9a8c\u8bbe\u8ba1', bg:'#6C63FF', char:'\u738b' },\n        { name:'\u9648\u601d\u8fdc', sub:'\u91d1\u5c71\u529e\u516c/\u7814\u53d1\u4e2d\u5fc3/\u524d\u7aef\u7ec4', bg:'#2DBB7C', char:'\u9648' },\n        { name:'\u5f20\u6893\u742a', sub:'\u91d1\u5c71\u529e\u516c/\u5e02\u573a\u90e8/\u54c1\u724c\u7ec4', bg:'#E76F51', char:'\u5f20' },\n        { name:'\u6797\u6653\u5f64', sub:'\u91d1\u5c71\u529e\u516c/AI\u4e8b\u4e1a\u90e8/NLP\u7ec4', bg:'#0A6CFF', char:'\u6797' },\n        { name:'\u5468\u601d\u7426', sub:'\u91d1\u5c71\u529e\u516c/\u7814\u53d1\u4e2d\u5fc3/\u540e\u7aef\u7ec4', bg:'#E9C46A', char:'\u5468' },\n        { name:'\u5434\u4f73\u742a', sub:'\u91d1\u5c71\u529e\u516c/\u4ea7\u54c1\u4e2d\u5fc3/\u589e\u957f\u7ec4', bg:'#9B2335', char:'\u5434' },\n        { name:'\u8d75\u4e00\u9e23', sub:'\u91d1\u5c71\u529e\u516c/AI\u4e8b\u4e1a\u90e8/\u89c6\u89c9AI\u7ec4', bg:'#457B9D', char:'\u8d75' },\n        { name:'\u5b59\u96e8\u742a', sub:'\u91d1\u5c71\u529e\u516c/\u7814\u53d1\u4e2d\u5fc3/\u79fb\u52a8\u7ec4', bg:'#E63946', char:'\u5b59' },\n        { name:'\u94b1\u6653\u78ca', sub:'\u91d1\u5c71\u529e\u516c/\u5e02\u573a\u90e8/\u589e\u957f\u8fd0\u8425', bg:'#2A9D8F', char:'\u94b1' },\n      ];\n\n      var permMap = { readonly:'\u4ec5\u67e5\u770b', view:'\u53ef\u67e5\u770b', comment:'\u53ef\u8bc4\u8bba', edit:'\u53ef\u7f16\u8f91', manage:'\u53ef\u7ba1\u7406' };\n      var selected = {};\n\n      var inp       = document.getElementById('addCollabSearchInput');\n      var clearBtn  = document.getElementById('addCollabSearchClear');\n      var dropdown  = document.getElementById('addCollabDropdown');\n      var results   = document.getElementById('addCollabResults');\n      var countEl   = document.getElementById('addCollabSelectedCount');\n      var confirmBtn= document.getElementById('addCollabConfirm');\n      var chipsList = document.getElementById('addCollabChipsList');\n      var emptyHint = document.getElementById('addCollabEmptyHint');\n      if (!inp) return;\n\n      function highlight(text, q) {\n        if (!q) return text;\n        var idx = text.toLowerCase().indexOf(q.toLowerCase());\n        if (idx < 0) return text;\n        return text.slice(0, idx)\n          + '<span style=\"color:var(--kd-color-public-normal)\">' + text.slice(idx, idx + q.length) + '</span>'\n          + text.slice(idx + q.length);\n      }\n\n      function getJoinedItems() {\n        var list = document.getElementById('collabList-web');\n        if (!list) return [];\n        return Array.from(list.querySelectorAll('.sp-cpanel-item')).map(function(item) {\n          var nameEl   = item.querySelector('.sp-cpanel-item__name');\n          var subEl    = item.querySelector('.sp-cpanel-item__sub');\n          var avatarEl = item.querySelector('.sp-cpanel-item__avatar');\n          return {\n            name: nameEl ? (nameEl.firstChild && nameEl.firstChild.nodeType===3 ? nameEl.firstChild.textContent.trim() : nameEl.textContent.trim()) : '',\n            sub:  subEl  ? subEl.textContent.trim() : '',\n            bg:   avatarEl ? (avatarEl.style.background || '#999') : '#999',\n            char: avatarEl ? avatarEl.textContent.trim() : '?',\n            perm: item.dataset.perm || ''\n          };\n        });\n      }\n\n      function renderChips() {\n        var keys = Object.keys(selected);\n        emptyHint.style.display = keys.length ? 'none' : 'flex';\n        chipsList.innerHTML = keys.map(function(name, idx) {\n          var p = selected[name];\n          var isLast = idx === keys.length - 1;\n          return '<div class=\"sp-cpanel-item\" style=\"padding-left:12px;padding-right:12px;cursor:default\">'\n            + '<div class=\"sp-cpanel-item__row\" style=\"padding:10px 0\">'\n            + '<span class=\"sp-cpanel-item__avatar\" style=\"background:' + p.bg + '\">' + p.char + '</span>'\n            + '<div class=\"sp-cpanel-item__info\">'\n            + '<div class=\"sp-cpanel-item__name\">' + p.name + '</div>'\n            + '<div class=\"sp-cpanel-item__sub\">' + p.sub + '</div>'\n            + '</div>'\n            + '<button data-chip-remove=\"' + name + '\" style=\"display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border:none;background:none;cursor:pointer;color:var(--kd-color-text-tertiary);flex-shrink:0;border-radius:var(--kd-radius-base)\">'\n            + '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M3 3l8 8M11 3l-8 8\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"/></svg>'\n            + '</button>'\n            + '</div>'\n            + (isLast ? '' : '<div class=\"sp-cpanel-item__sep\" style=\"margin-left:36px\"></div>')\n            + '</div>';\n        }).join('');\n      }\n\n      function updateCount() {\n        var n = Object.keys(selected).length;\n        if (countEl) countEl.textContent = '(' + n + ')';\n        if (confirmBtn) confirmBtn.disabled = n === 0;\n        renderChips();\n      }\n\n      function openDropdown(q) {\n        var ql = q.toLowerCase();\n        var joined = getJoinedItems().filter(function(p) {\n          return p.name.toLowerCase().includes(ql) || p.sub.toLowerCase().includes(ql);\n        });\n        var joinedNames = joined.map(function(p) { return p.name; });\n        var invitable = contacts.filter(function(c) {\n          return (c.name.toLowerCase().includes(ql) || c.sub.toLowerCase().includes(ql))\n            && !joinedNames.includes(c.name) && !selected[c.name];\n        });\n\n        if (!invitable.length && !joined.length) {\n          results.innerHTML = '<div style=\"padding:16px 8px;text-align:center;font-size:var(--kd-font-size-sub-base);color:var(--kd-color-text-tertiary)\">\u672a\u627e\u5230\u5339\u914d\u7684\u8054\u7cfb\u4eba</div>';\n          dropdown.style.display = 'block';\n          return;\n        }\n\n        function renderRow(p, isJoined) {\n          var permText = isJoined ? (permMap[p.perm] || p.perm) : '';\n          return '<div class=\"sp-cpanel-item add-collab-row\" data-name=\"' + p.name + '\" data-bg=\"' + p.bg + '\" data-char=\"' + p.char + '\" data-is-joined=\"' + isJoined + '\" style=\"cursor:' + (isJoined ? 'default' : 'pointer') + '\">'\n            + '<div class=\"sp-cpanel-item__row\">'\n            + '<span class=\"sp-cpanel-item__avatar\" style=\"background:' + p.bg + '\">' + p.char + '</span>'\n            + '<div class=\"sp-cpanel-item__info\">'\n            + '<div class=\"sp-cpanel-item__name\">' + highlight(p.name, q) + '</div>'\n            + '<div class=\"sp-cpanel-item__sub\">' + highlight(p.sub, q) + '</div>'\n            + '</div>'\n            + (isJoined && permText ? '<span class=\"sp-cpanel-item__perm-text\" style=\"display:inline-flex !important;font-size:var(--kd-font-size-small);color:var(--kd-color-text-secondary);white-space:nowrap\">\u5df2\u6388\u4e88' + permText + '\u6743\u9650</span>' : '')\n            + '</div>'\n            + '<div class=\"sp-cpanel-item__sep\"></div>'\n            + '</div>';\n        }\n\n        var html = '';\n        invitable.forEach(function(p) { html += renderRow(p, false); });\n        if (joined.length) {\n          joined.forEach(function(p) { html += renderRow(p, true); });\n        }\n        results.innerHTML = html;\n        dropdown.style.display = 'block';\n      }\n\n      function closeDropdown() {\n        dropdown.style.display = 'none';\n        results.innerHTML = '';\n      }\n\n\n\n      // \u786e\u5b9a\u6309\u94ae\uff1a\u5173\u95ed\u9762\u677f + toast\n      document.getElementById('addCollabConfirm').addEventListener('click', function() {\n        var names = Object.keys(selected);\n        if (!names.length) return;\n        var panel = document.getElementById('addCollabPanel');\n        panel.classList.remove('is-open');\n        var permText = document.getElementById('addCollabPermBtn').querySelector('.kd-button-children').textContent.trim();\n        var msg = names.length === 1\n          ? '\u5df2\u6dfb\u52a0 ' + names[0] + ' \u52a0\u5165\u534f\u4f5c\uff0c\u6743\u9650\uff1a' + permText\n          : '\u5df2\u6dfb\u52a0 ' + names.length + ' \u4f4d\u534f\u4f5c\u8005\uff0c\u6743\u9650\uff1a' + permText;\n        showKdToast('success', msg);\n        // \u91cd\u7f6e\u72b6\u6001\n        selected = {};\n        inp.value = '';\n        if (clearBtn) clearBtn.style.display = 'none';\n        renderChips();\n        updateCount();\n        closeDropdown();\n      });\n\n      // \u70b9\u51fb\u7ed3\u679c\u884c\uff1a\u9009\u4e2d\u540e\u843d\u5165 chips\n      results.addEventListener('click', function(e) {\n        var row = e.target.closest('.add-collab-row');\n        if (!row || row.dataset.isJoined === 'true') return;\n        var name = row.dataset.name;\n        var contact = contacts.find(function(c) { return c.name === name; });\n        if (!contact || selected[name]) return;\n        selected[name] = contact;\n        updateCount();\n        // \u6e05\u7a7a\u641c\u7d22\u6846\uff0c\u5173\u95ed\u6d6e\u5c42\n        inp.value = '';\n        if (clearBtn) clearBtn.style.display = 'none';\n        closeDropdown();\n        inp.focus();\n      });\n\n      // chip \u00d7 \u5220\u9664\n      document.addEventListener('click', function(e) {\n        var btn = e.target.closest('[data-chip-remove]');\n        if (!btn) return;\n        var name = btn.dataset.chipRemove;\n        if (selected[name]) { delete selected[name]; updateCount(); }\n      });\n\n      // \u8f93\u5165\u76d1\u542c\n      inp.addEventListener('input', function() {\n        var q = inp.value.trim();\n        if (clearBtn) clearBtn.style.display = q ? 'flex' : 'none';\n        if (q) { openDropdown(q); } else { closeDropdown(); }\n      });\n\n      // \u6e05\u9664\n      clearBtn && clearBtn.addEventListener('click', function() {\n        inp.value = '';\n        clearBtn.style.display = 'none';\n        closeDropdown();\n        inp.focus();\n      });\n\n      // \u70b9\u51fb\u6d6e\u5c42\u5916\u5173\u95ed\n      document.addEventListener('click', function(e) {\n        if (!dropdown.contains(e.target) && e.target !== inp && !inp.contains(e.target)) {\n          closeDropdown();\n        }\n      });\n\n      // hover \u6548\u679c\n      results.addEventListener('mouseover', function(e) {\n        var row = e.target.closest('.add-collab-row[data-is-joined=\"false\"]');\n        if (row) row.style.background = 'var(--kd-color-state-hover)';\n      });\n      results.addEventListener('mouseout', function(e) {\n        var row = e.target.closest('.add-collab-row');\n        if (row) row.style.background = '';\n      });\n    })();\n    <\/script>\n    <script>\n    // \u2500\u2500 \u901a\u8baf\u5f55\u5bf9\u8bdd\u6846 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    (function() {\n      var allContacts = {\n        recent: [\n          { name:'\u738b\u6d69',   sub:'\u91d1\u5c71\u529e\u516c/\u7814\u53d1\u90e8', El     = document.getElementById('addrBookSearch');\n      var clearBtn     = document.getElementById('addrBookSearchClear');\n      var confirmBtn   = document.getElementById('addrBookConfirm');\n      var cancelBtn    = document.getElementById('addrBookCancel');\n      var closeBtn     = document.getElementById('addrBookClose');\n      var tabsEl       = document.getElementById('addrBookTabs');\n\n      var addrSelected = {};\n      var currentTab   = 'recent';\n\n      function avatarEl(c, size) {\n        size = size || 32;\n        return '<span style=\"width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + c.bg + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:' + Math.round(size*0.4) + 'px;color:#fff;font-weight:500\">' + c.char + '</span>';\n      }\n\n      function renderList(q) {\n        var source = allContacts[currentTab] || [];\n        var filtered = source.filter(function(c) {\n          if (!q) return true;\n          return c.name.indexOf(q) !== -1 || c.sub.indexOf(q) !== -1;\n        });\n        if (!filtered.length) {\n          listEl.innerHTML = '<div style=\"padding:24px 0;text-align:center;font-size:var(--kd-font-size-sub-base);color:var(--kd-color-text-tertiary)\">\u6682\u65e0\u6570\u636e</div>';\n          return;\n        }\n        listEl.innerHTML = filtered.map(function(c) {\n          var checked = addrSelected[c.name] ? 'is-checked' : '';\n          var checkedAttr = addrSelected[c.name] ? 'checked' : '';\n          return '<label class=\"addr-book-item\" data-name=\"' + c.name + '\" style=\"display:flex;align-items:center;gap:10px;padding:8px 4px;cursor:pointer;border-radius:var(--kd-radius-sm)\">' +\n            '<span class=\"kd-checkbox-input ' + checked + '\" style=\"flex-shrink:0\">' +\n              '<span class=\"kd-checkbox-inner\"></span>' +\n              '<input type=\"checkbox\" class=\"kd-checkbox-original\" ' + checkedAttr + '>' +\n            '</span>' +\n            avatarEl(c, 32) +\n            '<span style=\"font-size:var(--kd-font-size-base);color:var(--kd-color-text-primary)\">' + c.name + '</span>' +\n          '</label>';\n        }).join('');\n      }\n\n      function renderRight() {\n        var names = Object.keys(addrSelected);\n        if (!names.length) {\n          emptyRight.style.display = 'flex';\n          selListEl.style.display = 'none';\n          confirmBtn.disabled = true;\n          return;\n        }\n        emptyRight.style.display = 'none';\n        selListEl.style.display = 'block';\n        confirmBtn.disabled = false;\n        selListEl.innerHTML = names.map(function(n) {\n          var c = addrSelected[n];\n          return '<div class=\"addr-right-item\">' +\n            avatarEl(c, 28) +\n            '<span style=\"flex:1;font-size:var(--kd-font-size-base);color:var(--kd-color-text-primary)\">' + c.name + '</span>' +\n            '<button data-remove=\"' + n + '\" style=\"background:none;border:none;cursor:pointer;padding:2px;color:var(--kd-color-text-tertiary)\">' +\n              '<svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><circle cx=\"7\" cy=\"7\" r=\"7\" fill=\"#C2C2C2\"/><path d=\"M4.5 4.5L9.5 9.5M9.5 4.5L4.5 9.5\" stroke=\"white\" stroke-width=\"1.2\" stroke-linecap=\"round\"/></svg>' +\n            '</button>' +\n          '</div>';\n        }).join('');\n      }\n\n      function openAddrBook() {\n        addrSelected = {};\n        currentTab = 'recent';\n        searchEl.value = '';\n        clearBtn.style.display = 'none';\n        tabsEl.querySelectorAll('.addr-tab').forEach(function(t) {\n          t.classList.remove('addr-tab-active');\n          t.style.color = 'var(--kd-color-text-secondary)';\n          if (t.dataset.tab === 'recent') { t.classList.add('addr-tab-active'); t.style.color = ''; }\n        });\n        renderList('');\n        renderRight();\n        overlay.style.display = 'flex';\n        requestAnimationFrame(function() { searchEl.focus(); });\n      }\n\n      function closeAddrBook() { overlay.style.display = 'none'; }\n\n      window.openAddrBook = openAddrBook;\n\n      // \u6807\u7b7e\u5207\u6362\n      tabsEl.addEventListener('click', function(e) {\n        var tab = e.target.closest('.addr-tab');\n        if (!tab) return;\n        currentTab = tab.dataset.tab;\n        tabsEl.querySelectorAll('.addr-tab').forEach(function(t) {\n          t.classList.remove('addr-tab-active');\n          t.style.color = 'var(--kd-color-text-secondary)';\n        });\n        tab.classList.add('addr-tab-active');\n        tab.style.color = '';\n        renderList(searchEl.value.trim());\n      });\n\n      // \u5217\u8868\u70b9\u51fb\u9009\u4e2d\n      listEl.addEventListener('click', function(e) {\n        var item = e.target.closest('.addr-book-item');\n        if (!item) return;\n        var name = item.dataset.name;\n        if (addrSelected[name]) {\n          delete addrSelected[name];\n        } else {\n          var source = allContacts[currentTab] || [];\n          var c = source.find(function(x) { return x.name === name; });\n          if (c) addrSelected[name] = c;\n        }\n        renderList(searchEl.value.trim());\n        renderRight();\n      });\n\n      // \u53f3\u4fa7\u79fb\u9664\n      selListEl.addEventListener('click', function(e) {\n        var btn = e.target.closest('[data-remove]');\n        if (!btn) return;\n        delete addrSelected[btn.dataset.remove];\n        renderList(searchEl.value.trim());\n        renderRight();\n      });\n\n      // \u641c\u7d22\n      searchEl.addEventListener('input', function() {\n        var q = searchEl.value.trim();\n        clearBtn.style.display = q ? 'flex' : 'none';\n        renderList(q);\n      });\n      clearBtn.addEventListener('click', function() {\n        searchEl.value = '';\n        clearBtn.style.display = 'none';\n        renderList('');\n        searchEl.focus();\n      });\n\n      closeBtn.addEventListener('click', closeA
